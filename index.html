<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Meinl Sonic Energy Compact Steel Tongue Drum — B Minor 432 Hz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Startup overlay -->
  <div id="overlay" class="overlay">
    <h1>Compact Steel Tongue Drum</h1>
    <p style="font-size:0.85em;opacity:0.7;margin-bottom:0.5em;">Meinl Sonic Energy CSTD1DG &bull; B Minor &bull; 432 Hz</p>
    <p>Tap anywhere to begin</p>
  </div>

  <!-- Mobile panel toggle (sound) -->
  <button class="panel-toggle" id="panel-toggle" aria-label="Toggle sound panel">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
      <circle cx="8" cy="6" r="2" fill="currentColor"/><circle cx="16" cy="12" r="2" fill="currentColor"/><circle cx="10" cy="18" r="2" fill="currentColor"/>
    </svg>
  </button>

  <!-- Mobile learn toggle -->
  <button class="learn-toggle" id="learn-toggle" aria-label="Toggle learn panel">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

  <div class="app-layout">

    <!-- Control Panel -->
    <aside class="panel" id="panel">
      <div class="panel-header">
        <h2>Sound Design</h2>
        <button class="panel-close" id="panel-close">&times;</button>
      </div>

      <!-- Preset -->
      <div class="panel-section">
        <h3>Preset</h3>
        <select id="preset-select">
          <option value="default" selected>Default</option>
          <option value="handpan">Handpan</option>
          <option value="bell">Bell</option>
          <option value="marimba">Marimba</option>
          <option value="deep">Deep &amp; Warm</option>
          <option value="custom" disabled hidden>Custom</option>
        </select>
      </div>

      <!-- Tone -->
      <div class="panel-section">
        <h3>Tone</h3>
        <div class="ctrl">
          <label><span>Harmonics</span><span class="ctrl-val" id="val-harmonicity">3.01</span></label>
          <input type="range" id="ctrl-harmonicity" min="0.5" max="8" step="0.01" value="3.01">
        </div>
        <div class="ctrl">
          <label><span>Brightness</span><span class="ctrl-val" id="val-modulationIndex">1.2</span></label>
          <input type="range" id="ctrl-modulationIndex" min="0" max="5" step="0.1" value="1.2">
        </div>
        <div class="ctrl">
          <label><span>Bloom</span><span class="ctrl-val" id="val-bloomCents">12 ct</span></label>
          <input type="range" id="ctrl-bloomCents" min="0" max="50" step="1" value="12">
        </div>
        <div class="ctrl">
          <label><span>Attack</span><span class="ctrl-val" id="val-attack">25 ms</span></label>
          <input type="range" id="ctrl-attack" min="1" max="150" step="1" value="25">
        </div>
      </div>

      <!-- Envelope -->
      <div class="panel-section">
        <h3>Envelope</h3>
        <div class="ctrl">
          <label><span>Sustain</span><span class="ctrl-val" id="val-decayScale">1.0x</span></label>
          <input type="range" id="ctrl-decayScale" min="0.2" max="3" step="0.1" value="1.0">
        </div>
        <div class="ctrl">
          <label><span>Harmonic Fade</span><span class="ctrl-val" id="val-modDecayRatio">0.30</span></label>
          <input type="range" id="ctrl-modDecayRatio" min="0.05" max="1" step="0.05" value="0.3">
        </div>
      </div>

      <!-- Space -->
      <div class="panel-section">
        <h3>Space</h3>
        <div class="ctrl">
          <label><span>Reverb</span><span class="ctrl-val" id="val-reverbWet">45%</span></label>
          <input type="range" id="ctrl-reverbWet" min="0" max="100" step="1" value="45">
        </div>
        <div class="ctrl">
          <label><span>Room Size</span><span class="ctrl-val" id="val-reverbDecay">4.0s</span></label>
          <input type="range" id="ctrl-reverbDecay" min="0.5" max="10" step="0.1" value="4">
        </div>
      </div>

      <!-- Mix -->
      <div class="panel-section">
        <h3>Mix</h3>
        <div class="ctrl">
          <label><span>Sub Bass</span><span class="ctrl-val" id="val-subLevel">-14 dB</span></label>
          <input type="range" id="ctrl-subLevel" min="-30" max="0" step="1" value="-14">
        </div>
        <div class="ctrl">
          <label><span>Volume</span><span class="ctrl-val" id="val-volume">0 dB</span></label>
          <input type="range" id="ctrl-volume" min="-30" max="6" step="1" value="0">
        </div>
      </div>

    </aside>

    <!-- Scrim for mobile drawer (sound panel) -->
    <div class="panel-scrim" id="panel-scrim"></div>

    <!-- Main stage -->
    <main class="stage">
      <div class="drum-container">
        <svg class="drum-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
          <!-- Drum face image -->
          <image href="drum-face.png" x="0" y="0" width="500" height="500" preserveAspectRatio="xMidYMid meet"/>

          <!--
            Tongue hit areas mapped to drum-face.png.
            Reference: Meinl Sonic Energy CSTD1DG, B Minor, 432 Hz.
            Centroid: 128 SVG units from center. Sizes scaled by pitch:
            A3=1.25x (largest) → D5=0.80x (smallest).
            Hit area: rounded-top rect covering the full tongue metal.
            Tongue path: slightly smaller, receives glow animation.
          -->
          <!-- Tongue 0: E4 (12 o'clock, 0°) — medium-large (1.12x) -->
          <g data-tongue-id="0" transform="translate(250,250) rotate(0) translate(0,-128)">
            <path class="tongue-hit" d="M-38,54 L-38,-16 A38,38 0 0 1 38,-16 L38,54 Z"/>
            <path id="tongue-0" class="tongue" d="M-30,47 L-30,-9 A30,31 0 0 1 30,-9 L30,47 Z"/>
            <text class="tongue-label" transform="rotate(0)" x="0" y="4">E4</text>
            <text class="tongue-key-hint" transform="rotate(0)" x="0" y="22">8</text>
          </g>
          <!-- Tongue 1: D5 (1:30, 45°) — smallest (0.80x) -->
          <g data-tongue-id="1" transform="translate(250,250) rotate(45) translate(0,-128)">
            <path class="tongue-hit" d="M-27,38 L-27,-11 A27,27 0 0 1 27,-11 L27,38 Z"/>
            <path id="tongue-1" class="tongue" d="M-22,34 L-22,-6 A22,22 0 0 1 22,-6 L22,34 Z"/>
            <text class="tongue-label" transform="rotate(-45)" x="0" y="4">D5</text>
            <text class="tongue-key-hint" transform="rotate(-45)" x="0" y="20">9</text>
          </g>
          <!-- Tongue 2: D4 (3 o'clock, 90°) — large (1.16x) -->
          <g data-tongue-id="2" transform="translate(250,250) rotate(90) translate(0,-128)">
            <path class="tongue-hit" d="M-39,56 L-39,-16 A39,39 0 0 1 39,-16 L39,56 Z"/>
            <path id="tongue-2" class="tongue" d="M-31,49 L-31,-9 A31,32 0 0 1 31,-9 L31,49 Z"/>
            <text class="tongue-label" transform="rotate(-90)" x="0" y="4">D4</text>
            <text class="tongue-key-hint" transform="rotate(-90)" x="0" y="22">6</text>
          </g>
          <!-- Tongue 3: A4 (4:30, 135°) — medium-small (0.98x) -->
          <g data-tongue-id="3" transform="translate(250,250) rotate(135) translate(0,-128)">
            <path class="tongue-hit" d="M-33,47 L-33,-14 A33,33 0 0 1 33,-14 L33,47 Z"/>
            <path id="tongue-3" class="tongue" d="M-26,41 L-26,-8 A26,27 0 0 1 26,-8 L26,41 Z"/>
            <text class="tongue-label" transform="rotate(-135)" x="0" y="4">A4</text>
            <text class="tongue-key-hint" transform="rotate(-135)" x="0" y="22">3</text>
          </g>
          <!-- Tongue 4: A3 (6 o'clock, 180°) — largest (1.25x) -->
          <g data-tongue-id="4" transform="translate(250,250) rotate(180) translate(0,-128)">
            <path class="tongue-hit" d="M-43,60 L-43,-18 A43,43 0 0 1 43,-18 L43,60 Z"/>
            <path id="tongue-4" class="tongue" d="M-34,53 L-34,-10 A34,35 0 0 1 34,-10 L34,53 Z"/>
            <text class="tongue-label" transform="rotate(-180)" x="0" y="4">A3</text>
            <text class="tongue-key-hint" transform="rotate(-180)" x="0" y="22">2</text>
          </g>
          <!-- Tongue 5: Gb4 (7:30, 225°) — medium (1.04x) -->
          <g data-tongue-id="5" transform="translate(250,250) rotate(225) translate(0,-128)">
            <path class="tongue-hit" d="M-35,50 L-35,-15 A35,35 0 0 1 35,-15 L35,50 Z"/>
            <path id="tongue-5" class="tongue" d="M-28,44 L-28,-8 A28,29 0 0 1 28,-8 L28,44 Z"/>
            <text class="tongue-label" transform="rotate(-225)" x="0" y="4">Gb4</text>
            <text class="tongue-key-hint" transform="rotate(-225)" x="0" y="22">1</text>
          </g>
          <!-- Tongue 6: B3 (9 o'clock, 270°) — large (1.20x) -->
          <g data-tongue-id="6" transform="translate(250,250) rotate(270) translate(0,-128)">
            <path class="tongue-hit" d="M-41,58 L-41,-17 A41,41 0 0 1 41,-17 L41,58 Z"/>
            <path id="tongue-6" class="tongue" d="M-32,50 L-32,-10 A32,34 0 0 1 32,-10 L32,50 Z"/>
            <text class="tongue-label" transform="rotate(-270)" x="0" y="4">B3</text>
            <text class="tongue-key-hint" transform="rotate(-270)" x="0" y="22">4</text>
          </g>
          <!-- Tongue 7: B4 (10:30, 315°) — small (0.88x) -->
          <g data-tongue-id="7" transform="translate(250,250) rotate(315) translate(0,-128)">
            <path class="tongue-hit" d="M-30,42 L-30,-12 A30,30 0 0 1 30,-12 L30,42 Z"/>
            <path id="tongue-7" class="tongue" d="M-24,37 L-24,-7 A24,25 0 0 1 24,-7 L24,37 Z"/>
            <text class="tongue-label" transform="rotate(-315)" x="0" y="4">B4</text>
            <text class="tongue-key-hint" transform="rotate(-315)" x="0" y="22">7</text>
          </g>
        </svg>
      </div>

      <div class="key-bar">
        <kbd>7</kbd> B4 &nbsp;
        <kbd>8</kbd> E4 &nbsp;
        <kbd>9</kbd> D5 &nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>4</kbd> B3 &nbsp;
        <kbd>6</kbd> D4 &nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>1</kbd> Gb4 &nbsp;
        <kbd>2</kbd> A3 &nbsp;
        <kbd>3</kbd> A4
      </div>
    </main>

    <!-- Learn Panel -->
    <aside class="learn-panel" id="learn-panel">
      <div class="panel-header">
        <h2>Learn</h2>
        <button class="panel-close" id="learn-close">&times;</button>
      </div>

      <div class="panel-section">
        <h3>Song</h3>
        <select id="song-select">
          <option value="twinkle">Twinkle Twinkle Little Star</option>
        </select>
      </div>

      <div class="panel-section learn-controls">
        <button class="learn-btn" id="learn-start">Start</button>
        <button class="learn-btn learn-btn--secondary" id="learn-reset" disabled>Reset</button>
      </div>

      <div class="panel-section" id="learn-progress-section" style="display:none;">
        <h3>Progress</h3>
        <div class="learn-progress-text" id="learn-progress-text">0 / 0</div>
        <div class="learn-progress-bar">
          <div class="learn-progress-fill" id="learn-progress-fill"></div>
        </div>
      </div>

      <div class="panel-section" id="learn-note-section" style="display:none;">
        <h3>Next Note</h3>
        <div class="learn-note-display" id="learn-note-display">—</div>
      </div>

      <div class="panel-section" id="learn-lyrics-section" style="display:none;">
        <h3>Lyrics</h3>
        <div class="learn-lyrics" id="learn-lyrics"></div>
      </div>
    </aside>

    <!-- Scrim for mobile learn drawer -->
    <div class="learn-scrim" id="learn-scrim"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="app.js"></script>
</body>
</html>
